<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuLabs</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Outfit',sans-serif;
}

body {
  background:#050505;
  color:white;
}

/* NAVBAR */
.nav {
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:20px 40px;

  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(10px);
}

.nav-logo {
  height:38px;
  object-fit:contain;
}

.nav-links {
  display:flex;
  gap:30px;
}

.nav-links a {
  color:rgba(255,255,255,0.7);
  text-decoration:none;
  font-size:14px;
  transition:0.3s;
}

.nav-links a:hover {
  color:#d4af37;
}

.nav-cta {
  border:1px solid #d4af37;
  padding:10px 20px;
  border-radius:30px;
  color:#d4af37;
  text-decoration:none;
}

/* HERO */
.hero {
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
}

.content {
  position:relative;
  z-index:2;
  top:50%;
  transform:translateY(-50%);
  text-align:center;
  padding:20px;
}

h1 {
  font-size:60px;
}

.gold {
  color:#d4af37;
}

p {
  margin-top:20px;
  color:rgba(255,255,255,0.7);
}

.buttons {
  margin-top:30px;
}

.btn {
  padding:15px 30px;
  margin:10px;
  border-radius:30px;
  text-decoration:none;
}

.primary {
  background:linear-gradient(90deg,#f6d365,#d4af37);
  color:black;
}

.secondary {
  border:1px solid rgba(255,255,255,0.3);
  color:white;
}

/* MOBILE */
@media(max-width:768px){
  .nav-links {
    display:none;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <img src="./logo.png" alt="AuLabs" class="nav-logo">

  <div class="nav-links">
    <a href="#">ABOUT</a>
    <a href="#">SERVICES</a>
    <a href="#">SHOWCASE</a>
    <a href="#">VISION</a>
  </div>

  <a href="#" class="nav-cta">GET IN TOUCH</a>
</div>

<!-- HERO -->
<div class="hero">

  <video autoplay muted loop playsinline>
    <source src="./hero-video.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="content">
    <h1>
      Crafting Worlds.<br>
      <span class="gold">Defining Play.</span>
    </h1>

    <p>
      We build immersive games, advanced systems,
      and next-gen digital experiences.
    </p>

    <div class="buttons">
      <a href="#" class="btn primary">View Our Work</a>
      <a href="#" class="btn secondary">Partner With Us</a>
    </div>
  </div>

</div>

</body>
</html>
